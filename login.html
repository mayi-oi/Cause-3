<!DOCTYPE html>
<html>

<body>
      <div class="version"> WORK IN PROGESS <br>Baut nummer: #3<br>Version: 0.1 [in-dev]</div>

                  <div class="logo">
                        <a href="index.html">

            <br>
            <div class="anmelden">
                  <h2>Login zur Vertretungsplan!</h2>
                  <p>Gibt ein Passwort zu melden!</p>
                  <br>
                        <div class="anmelden-form">
                              <form>
                                    <label for="name">Passwort</label>
                                    <input type="password" id="password" placeholder="Passwort" minlength="4" required>
                                    <input type="submit"  value="Login jetzt!">

                              </form>
                        </div>
            </div>
      </div>
